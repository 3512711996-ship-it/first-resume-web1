<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>第一份简历 · 第6步</title>
  <link rel="stylesheet" href="./styles.css?v=kenichi-gallery-6" />
</head>
<body data-step="resume">
  <div class="depth-field">
    <span class="plane p-1"></span>
    <span class="plane p-2"></span>
    <span class="plane p-3"></span>
    <span class="plane p-4"></span>
    <span class="plane p-5"></span>
  </div>
  <div class="noise-overlay"></div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <div>
          <h1>第一份简历</h1>
          <p>无经历用户起步系统</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="ghost-btn" id="saveBtn" type="button">保存草稿</button>
        <button class="ghost-btn" id="resetBtn" type="button">重置流程</button>
      </div>
    </header>

    <section class="progress-card">
      <div class="progress-meta" id="progressMeta"></div>
      <div class="progress-track" id="progressTrack"></div>
    </section>

    <main id="appMain"></main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
